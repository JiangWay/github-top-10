<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="GitHub Top 10 每日觀察">
  <!-- Warm paper background -->
  <rect width="1200" height="630" fill="#f9f6ef"/>
  <!-- Subtle top terracotta rule -->
  <rect x="96" y="96" width="80" height="4" fill="#b85a3a"/>
  <!-- Kicker -->
  <text x="96" y="150" font-family="'Inter','Helvetica',sans-serif" font-size="22" font-weight="600" fill="#7a6b54" letter-spacing="3">VOL · DAILY</text>
  <!-- Brand mark (simple square + dot) -->
  <rect x="1000" y="96" width="48" height="48" rx="10" fill="#1f1b15"/>
  <rect x="1000" y="96" width="24" height="24" fill="#b85a3a"/>
  <circle cx="1036" cy="114" r="5" fill="#f9f6ef"/>
  <!-- Main title -->
  <text x="96" y="290" font-family="'Noto Serif TC','Songti TC',serif" font-size="92" font-weight="700" fill="#1f1b15">GitHub Top 10</text>
  <text x="96" y="390" font-family="'Noto Serif TC','Songti TC',serif" font-size="64" font-weight="500" fill="#3a3428">每日觀察 · 每一種正在進化的想法</text>
  <!-- Bottom meta row -->
  <line x1="96" y1="500" x2="1104" y2="500" stroke="#d8cfbe" stroke-width="1"/>
  <text x="96" y="545" font-family="'Inter','Helvetica',sans-serif" font-size="22" fill="#7a6b54">以紙本閱讀的節奏閱讀網路</text>
  <text x="1104" y="545" text-anchor="end" font-family="'JetBrains Mono','Menlo',monospace" font-size="22" fill="#7a6b54">jiangway.github.io/github-top-10</text>
</svg>
